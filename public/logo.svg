<svg viewBox="0 0 1024 1024" width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 定义渐变色，增加科技感 -->
    <linearGradient id="outerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005F73;stop-opacity:1" />
    </linearGradient>
    
    <!-- 立方体面的颜色定义 -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- 1. 外部轮廓：保留原有的流线型设计，象征 AI 的能量与循环 -->
  <!-- 调整了透明度，使其作为背景不抢眼 -->
  <path d="M1019.95 635.45c-7.17 23.38-20.48 42.27-35.84 57.86-15.36 15.53-32.71 28.84-51.14 41.13-73.67 47.84-158.66 74.47-234.38 92.27a1189.55 1189.55 0 0 1-91.08 15.59v-119.01c23.55 0 50.12 0 77.77-2.22 70.6-4.44 152.52-15.59 221.13-43.35 33.73-14.45 65.48-33.39 78.79-58.94a54.95 54.95 0 0 0 5.12-40 111.84 111.84 0 0 0-19.57-36.69 255.43 255.43 0 0 0-48.01-44.49c-13.31-8.82-20.48-13.31-20.48-13.31s8.19 2.22 22.53 8.93c14.34 6.66 35.84 15.53 58.31 34.47 11.26 8.82 23.55 21.11 32.77 42.21 9.22 17.81 11.26 43.41 4.1 65.59z" fill="url(#outerGradient)" opacity="0.9"></path>

  <!-- 2. 核心主体：3D 立方体 -->
  <!-- 将立方体居中放置，并增加了描边和立体光影 -->
  <g transform="translate(512, 512)" filter="url(#dropShadow)">
    
    <!-- 顶面 (最亮) -->
    <path d="M0 -120 L104 -60 L0 0 L-104 -60 Z" fill="#E0F7FA" stroke="#006064" stroke-width="8" stroke-linejoin="round"></path>
    
    <!-- 右侧面 (中间色) -->
    <path d="M0 0 L104 -60 L104 60 L0 120 Z" fill="#00BCD4" stroke="#006064" stroke-width="8" stroke-linejoin="round"></path>
    
    <!-- 左侧面 (深色) -->
    <path d="M-104 -60 L0 0 L0 120 L-104 60 Z" fill="#0097A7" stroke="#006064" stroke-width="8" stroke-linejoin="round"></path>
    
    <!-- 内部高光线条 (增加精致感) -->
    <line x1="0" y1="-120" x2="0" y2="120" stroke="#fff" stroke-width="2" opacity="0.5"></line>
    <line x1="-104" y1="60" x2="104" y2="60" stroke="#fff" stroke-width="2" opacity="0.3"></line>
  </g>
</svg>